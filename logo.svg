<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Filter Pendaran Neon -->
    <filter id="neonBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Icon (Dark Theme) -->
  <rect width="512" height="512" rx="110" fill="#0b0c10" stroke="#1f2833" stroke-width="4"/>

  <!-- Kartu Belakang (Neon Ungu dengan Grafik Skor) -->
  <g transform="translate(130, 100) rotate(-12)">
    <rect width="180" height="260" rx="20" fill="#0b0c10" stroke="#bc13fe" stroke-width="12" filter="url(#neonPurple)"/>
    <!-- Abstract Chart -->
    <line x1="40" y1="200" x2="80" y2="120" stroke="#bc13fe" stroke-width="10" stroke-linecap="round" filter="url(#neonPurple)"/>
    <line x1="80" y1="120" x2="110" y2="160" stroke="#bc13fe" stroke-width="10" stroke-linecap="round" filter="url(#neonPurple)"/>
    <line x1="110" y1="160" x2="140" y2="80" stroke="#bc13fe" stroke-width="10" stroke-linecap="round" filter="url(#neonPurple)"/>
  </g>

  <!-- Kartu Depan (Neon Biru dengan Bintang & Karakter Fa) -->
  <g transform="translate(230, 140) rotate(8)">
    <rect width="180" height="260" rx="20" fill="#0b0c10" stroke="#00f3ff" stroke-width="12" filter="url(#neonBlue)"/>
    
    <!-- Karakter Fa (Keberuntungan/Kemenangan) -->
    <text x="90" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="bold" fill="#ffd700" text-anchor="middle" filter="url(#neonGold)">發</text>
    
    <!-- Bintang Neon di Sudut -->
    <path d="M 35 35 L 40 50 L 55 50 L 42 60 L 47 75 L 35 65 L 23 75 L 28 60 L 15 50 L 30 50 Z" fill="#ffd700" filter="url(#neonGold)"/>
    <path d="M 145 225 L 150 240 L 165 240 L 152 250 L 157 265 L 145 255 L 133 265 L 138 250 L 125 240 L 140 240 Z" fill="#ffd700" filter="url(#neonGold)"/>
  </g>
</svg>
